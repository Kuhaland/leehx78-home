<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <script>
    var segmentCount = 1;
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      '/leehx78-home/?p=' +
      l.pathname.slice(1).split('/').slice(segmentCount).join('/') +
      (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
